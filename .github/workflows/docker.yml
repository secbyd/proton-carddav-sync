name: Docker

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]

# Publishing requires two repository secrets:
#   DOCKERHUB_USERNAME  – your Docker Hub account/namespace
#   DOCKERHUB_TOKEN     – a Docker Hub access token (Account Settings → Security)
# The image is published as docker.io/<DOCKERHUB_USERNAME>/proton-carddav-sync.
# Pull requests build the image (to catch breakage) but never push.

permissions:
  contents: read

jobs:
  image:
    name: Build & push image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (for linux/arm64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME || 'local' }}/proton-carddav-sync
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha,format=short

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Publish the repository overview (DOCKERHUB.md) to the Docker Hub repo
      # page. Only on main pushes. If the token lacks permission for the
      # description API, set DOCKERHUB_TOKEN to an account password instead.
      - name: Update Docker Hub repository overview
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ secrets.DOCKERHUB_USERNAME }}/proton-carddav-sync
          short-description: "Sync Proton Mail contacts with any CardDAV server (Nextcloud, Radicale, Baikal)."
          readme-filepath: ./DOCKERHUB.md
