name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

# All jobs build against the committed vendor/ directory (-mod=vendor).
# vendor/ contains a local patch to github.com/ProtonMail/go-proton-api
# (address.go, slices.SortFunc Go 1.21 compatibility — see patches/README.md).
# Do NOT run `go mod vendor` in CI: it would revert that patch.

jobs:
  # ──────────────────────────────────────────────
  # 1. Lint — go vet + golangci-lint (vendored)
  # ──────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install gcc (required by go-sqlite3 CGO)
        run: sudo apt-get install -y gcc

      - name: Verify vendor consistency
        run: go mod verify && go build -mod=vendor -o /dev/null ./...

      - name: go vet
        run: go vet -mod=vendor ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

  # ──────────────────────────────────────────────
  # 2. Test (vendored)
  # ──────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install gcc (required by go-sqlite3 CGO)
        run: sudo apt-get install -y gcc

      - name: Run tests
        run: go test -mod=vendor -race -count=1 ./...

  # ──────────────────────────────────────────────
  # 3. Build — linux/amd64+arm64 on Ubuntu, darwin/amd64+arm64 on macOS
  #
  # go-sqlite3 needs CGO, so each target is built on a host that has a native
  # C toolchain for it: linux/arm64 cross-compiles with aarch64-linux-gnu-gcc,
  # and the darwin targets build natively on macOS runners (cross-compiling
  # CGO to darwin from Linux fails — clang's `-arch` is unknown to Linux gcc).
  # ──────────────────────────────────────────────
  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ${{ matrix.runner }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install aarch64 cross-compiler (linux/arm64 only)
        if: matrix.goos == 'linux' && matrix.goarch == 'arm64'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
          CC: ${{ matrix.goos == 'darwin' && 'clang' || (matrix.goarch == 'arm64' && 'aarch64-linux-gnu-gcc' || 'gcc') }}
        run: |
          mkdir -p dist
          # Default binary name is proton-carddav-sync; the os/arch lives in the
          # artifact name, not the executable.
          go build -mod=vendor \
            -ldflags "-s -w -X main.version=${GITHUB_SHA::8}" \
            -o dist/proton-carddav-sync \
            ./cmd/proton-carddav-sync

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: proton-carddav-sync-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/proton-carddav-sync
          retention-days: 7
