name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

# All jobs build against the committed vendor/ directory (-mod=vendor).
# vendor/ contains a local patch to github.com/ProtonMail/go-proton-api
# (address.go, slices.SortFunc Go 1.21 compatibility — see patches/README.md).
# Do NOT run `go mod vendor` in CI: it would revert that patch.

jobs:
  # ──────────────────────────────────────────────
  # 1. Lint — go vet + golangci-lint (vendored)
  # ──────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install gcc (required by go-sqlite3 CGO)
        run: sudo apt-get install -y gcc

      - name: Verify vendor consistency
        run: go mod verify && go build -mod=vendor -o /dev/null ./...

      - name: go vet
        run: go vet -mod=vendor ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

  # ──────────────────────────────────────────────
  # 2. Test (vendored)
  # ──────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install gcc (required by go-sqlite3 CGO)
        run: sudo apt-get install -y gcc

      - name: Run tests
        run: go test -mod=vendor -race -count=1 ./...

  # ──────────────────────────────────────────────
  # 3. Build — cross-compile linux/amd64+arm64, darwin/amd64+arm64
  # ──────────────────────────────────────────────
  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install gcc (required by go-sqlite3 CGO)
        run: |
          sudo apt-get update -q
          sudo apt-get install -y gcc gcc-aarch64-linux-gnu

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
          CC: ${{ matrix.goarch == 'arm64' && matrix.goos == 'linux' && 'aarch64-linux-gnu-gcc' || 'gcc' }}
        run: |
          mkdir -p dist
          go build -mod=vendor \
            -ldflags "-s -w -X main.version=${GITHUB_SHA::8}" \
            -o dist/proton-carddav-sync-${{ matrix.goos }}-${{ matrix.goarch }} \
            ./cmd/proton-carddav-sync

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: proton-carddav-sync-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/proton-carddav-sync-${{ matrix.goos }}-${{ matrix.goarch }}
          retention-days: 7
