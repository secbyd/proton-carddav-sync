name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

# All jobs build against the committed vendor/ directory (-mod=vendor).
# vendor/ contains a local patch to github.com/ProtonMail/go-proton-api
# (address.go, slices.SortFunc Go 1.21 compatibility — see patches/README.md).
# Do NOT run `go mod vendor` in CI: it would revert that patch.

jobs:
  # ──────────────────────────────────────────────
  # 1. Lint — go vet + golangci-lint (vendored)
  # ──────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install gcc (required by go-sqlite3 CGO)
        run: sudo apt-get install -y gcc

      - name: Verify vendor consistency
        run: go mod verify && go build -mod=vendor -o /dev/null ./...

      - name: go vet
        run: go vet -mod=vendor ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

  # ──────────────────────────────────────────────
  # 2. Test (vendored)
  # ──────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install gcc (required by go-sqlite3 CGO)
        run: sudo apt-get install -y gcc

      - name: Run tests
        run: go test -mod=vendor -race -count=1 ./...

  # ──────────────────────────────────────────────
  # 3. Build — linux/amd64 only (CGO via native gcc; go-sqlite3 needs CGO)
  # ──────────────────────────────────────────────
  build:
    name: Build (linux/amd64)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: 1
          CC: gcc
        run: |
          mkdir -p dist
          go build -mod=vendor \
            -ldflags "-s -w -X main.version=${GITHUB_SHA::8}" \
            -o dist/proton-carddav-sync \
            ./cmd/proton-carddav-sync

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: proton-carddav-sync-linux-amd64
          path: dist/proton-carddav-sync
          retention-days: 7
