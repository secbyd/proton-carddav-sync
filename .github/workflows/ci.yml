name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  # ──────────────────────────────────────────────
  # 1. Lint — go mod tidy check + go vet + golangci-lint
  # ──────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install gcc (required by go-sqlite3 CGO)
        run: sudo apt-get install -y gcc

      - name: Download modules (populate module cache)
        run: go mod download

      - name: Patch go-proton-api address.go (slices.SortFunc Go 1.21 compat)
        run: |
          MOD=$(go env GOMODCACHE)/github.com/\!proton\!mail/go-proton-api@v0.4.0
          chmod -R u+w "$MOD"
          FILE="$MOD/address.go"
          sed -i 's|"golang.org/x/exp/slices"|"cmp"\n\t"slices"|' "$FILE"
          sed -i 's/func(a, b Address) bool {/func(a, b Address) int {/' "$FILE"
          sed -i 's/return a\.Order < b\.Order/return cmp.Compare(a.Order, b.Order)/' "$FILE"

      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

  # ──────────────────────────────────────────────
  # 2. Test
  # ──────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install gcc (required by go-sqlite3 CGO)
        run: sudo apt-get install -y gcc

      - name: Download modules (populate module cache)
        run: go mod download

      - name: Patch go-proton-api address.go (slices.SortFunc Go 1.21 compat)
        run: |
          MOD=$(go env GOMODCACHE)/github.com/\!proton\!mail/go-proton-api@v0.4.0
          chmod -R u+w "$MOD"
          FILE="$MOD/address.go"
          sed -i 's|"golang.org/x/exp/slices"|"cmp"\n\t"slices"|' "$FILE"
          sed -i 's/func(a, b Address) bool {/func(a, b Address) int {/' "$FILE"
          sed -i 's/return a\.Order < b\.Order/return cmp.Compare(a.Order, b.Order)/' "$FILE"

      - name: Run tests
        run: go test -v -race -count=1 ./...

  # ──────────────────────────────────────────────
  # 3. Build — cross-compile linux/amd64 + linux/arm64 + darwin/amd64
  # ──────────────────────────────────────────────
  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install gcc (required by go-sqlite3 CGO)
        run: |
          sudo apt-get update -q
          sudo apt-get install -y gcc gcc-aarch64-linux-gnu

      - name: Download modules (populate module cache)
        run: go mod download

      - name: Patch go-proton-api address.go (slices.SortFunc Go 1.21 compat)
        run: |
          MOD=$(go env GOMODCACHE)/github.com/\!proton\!mail/go-proton-api@v0.4.0
          chmod -R u+w "$MOD"
          FILE="$MOD/address.go"
          sed -i 's|"golang.org/x/exp/slices"|"cmp"\n\t"slices"|' "$FILE"
          sed -i 's/func(a, b Address) bool {/func(a, b Address) int {/' "$FILE"
          sed -i 's/return a\.Order < b\.Order/return cmp.Compare(a.Order, b.Order)/' "$FILE"

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
          CC: ${{ matrix.goarch == 'arm64' && matrix.goos == 'linux' && 'aarch64-linux-gnu-gcc' || 'gcc' }}
        run: |
          mkdir -p dist
          go build \
            -ldflags "-s -w -X main.version=${GITHUB_SHA::8}" \
            -o dist/proton-carddav-sync-${{ matrix.goos }}-${{ matrix.goarch }} \
            ./cmd/proton-carddav-sync

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: proton-carddav-sync-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/proton-carddav-sync-${{ matrix.goos }}-${{ matrix.goarch }}
          retention-days: 7
