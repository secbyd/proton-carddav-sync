version: "2"
run:
  allow-parallel-runners: true
linters:
  enable:
    - bodyclose
    - contextcheck
    - errorlint
    - godot
    - gosec
    - misspell
    - nilerr
    - noctx
  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true
    godot:
      scope: declarations
      period: true
    gosec:
      excludes:
        - G401
        - G505
    govet:
      enable-all: true
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - gosec
        path: internal/syncer/hash\.go
        text: G401|G505
      - linters:
          - govet
        path: _test\.go
        text: loopclosure
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/secbyd/proton-carddav-sync
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
